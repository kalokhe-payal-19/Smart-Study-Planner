<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tasks - Smart Study Planner</title>

</head>

</div>

<div class="container">

  <h1>Task Manager</h1>

  <!-- Add Task -->
  <div class="task-input-box">
  <div class="card">
  <h2>🎮 Your Progress</h2>
  <p id="xpDisplay"></p>
  <p id="levelDisplay"></p>
  <input type="text" id="taskInput" placeholder="✨ Add a new mission...">
  <button onclick="addNewTask()">➕ Add</button>
</div>

  <!-- Sections -->
  <div class="task-container">

    <div class="task-box">
      <h2>To Start</h2>
      <ul id="toStart"></ul>
    </div>

    <div class="task-box">
      <h2>Active</h2>
      <ul id="active"></ul>
    </div>

    <div class="task-box">
      <h2>Completed</h2>
      <ul id="completed"></ul>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
